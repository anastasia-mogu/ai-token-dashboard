<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Token 仪表盘</title>
<script src="vendor/chart.umd.min.js"></script>
<script src="data.example.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #080808;
    --surface: #0d0d0c;
    --line: #363630;
    --line-strong: #f2f0e9;
    --text: #f2f0e9;
    --muted: #aaa99f;
    --accent: #d8ff3e;
    --display-font: Impact, Haettenschweiler, "Arial Narrow Bold", "PingFang SC", sans-serif;
    --ui-font: "Arial Narrow", "Helvetica Neue", "PingFang SC", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--ui-font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    letter-spacing: 0.01em;
  }
  .topbar {
    min-height: 64px;
    padding: 16px 30px;
    display: flex;
    align-items: center;
    gap: 28px;
    border-bottom: 1px solid var(--line);
  }
  h1 {
    font-family: var(--display-font);
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .subtitle {
    margin-left: auto;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .dashboard { width: 100%; }
  .stats {
    display: grid;
    grid-template-columns: minmax(360px, 0.9fr) minmax(0, 1.35fr);
    min-height: 360px;
    border-bottom: 1px solid var(--line);
  }
  .stat-card { min-width: 0; }
  .stat-card--hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 42px 38px;
    border-right: 1px solid var(--line);
  }
  .stat-label {
    color: var(--text);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
  }
  .stat-value {
    font-family: var(--display-font);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 0.95;
    white-space: nowrap;
  }
  .stat-value .unit {
    font-family: var(--ui-font);
    font-weight: 800;
    letter-spacing: 0.02em;
    margin-left: 0.12em;
    display: inline-block;
    vertical-align: baseline;
  }
  .stat-value .unit-symbol { font-weight: 900; }
  .stat-value .unit-symbol--cn {
    font-family: "PingFang SC", "Helvetica Neue", sans-serif;
    font-weight: 900;
  }
  .stat-card--hero .stat-value {
    color: var(--text);
    font-size: clamp(78px, 9.5vw, 154px);
    letter-spacing: -0.035em;
    margin: 24px 0 12px;
  }
  .stat-card--hero .stat-value .unit { font-size: 17px; }
  .stat-sub {
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    line-height: 1.45;
  }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
  }
  .metric-grid .stat-card {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 28px 26px;
    border-right: 1px solid var(--line);
  }
  .metric-grid .stat-card:nth-child(1),
  .metric-grid .stat-card:nth-child(2) { grid-column: span 3; border-bottom: 1px solid var(--line); }
  .metric-grid .stat-card:nth-child(n+3) { grid-column: span 2; }
  .metric-grid .stat-card:nth-child(2),
  .metric-grid .stat-card:nth-child(5) { border-right: 0; }
  .metric-grid .stat-label {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .metric-grid .stat-value {
    color: var(--accent);
    font-size: clamp(32px, 3.25vw, 58px);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .metric-grid .stat-value .unit { font-size: 14px; color: var(--muted); }
  .charts,
  .bottom {
    display: grid;
    gap: 0;
    border-bottom: 1px solid var(--line);
  }
  .charts { grid-template-columns: 1.8fr 1fr; }
  .bottom { grid-template-columns: 1fr 1fr; }
  .chart-card {
    min-width: 0;
    padding: 28px 30px 26px;
    background: var(--bg);
    border-right: 1px solid var(--line);
  }
  .charts .chart-card:last-child,
  .bottom .chart-card:last-child { border-right: 0; }
  .chart-card h2 {
    color: var(--text);
    font-family: var(--display-font);
    font-size: 21px;
    font-weight: 900;
    letter-spacing: 0.01em;
    margin-bottom: 22px;
  }
  .chart-wrap { height: 340px; }
  .bottom .chart-wrap { height: 300px; }
  .project-card { grid-column: 1 / -1; border-right: 0; }
  .project-list { display: flex; flex-direction: column; gap: 12px; max-height: 340px; overflow-y: auto; }
  .project-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .project-name { color: var(--text); font-family: "SF Mono", monospace; }
  .project-bar { flex: 1; height: 8px; background: #1c1c18; margin: 0 14px; overflow: hidden; }
  .project-bar-fill { height: 100%; background: var(--accent); }
  .project-tokens { color: var(--text); font-family: var(--display-font); font-size: 16px; font-variant-numeric: tabular-nums; min-width: 90px; text-align: right; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .footer { padding: 20px 30px 28px; color: var(--muted); font-size: 12px; text-align: center; }
  @media (max-width: 980px) {
    .topbar { align-items: flex-start; flex-direction: column; gap: 8px; }
    .subtitle { margin-left: 0; }
    .stats { grid-template-columns: 1fr; }
    .stat-card--hero { border-right: 0; border-bottom: 1px solid var(--line); }
    .charts, .bottom { grid-template-columns: 1fr; }
    .chart-card { border-right: 0; border-bottom: 1px solid var(--line); }
    .chart-card:last-child { border-bottom: 0; }
  }
  @media (max-width: 640px) {
    .topbar, .chart-card, .stat-card--hero { padding-left: 20px; padding-right: 20px; }
    .metric-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
    .metric-grid .stat-card,
    .metric-grid .stat-card:nth-child(n) {
      grid-column: 1;
      border-right: 0;
      border-bottom: 1px solid var(--line);
      padding: 24px 20px;
    }
    .metric-grid .stat-card:last-child { border-bottom: 0; }
    .stat-card--hero .stat-value { font-size: clamp(62px, 22vw, 104px); }
    .chart-wrap, .bottom .chart-wrap { height: 280px; }
  }
</style>
</head>
<body>
<header class="topbar">
  <h1>AI Token 仪表盘</h1>
  <div class="subtitle" id="subtitle">加载中...</div>
</header>

<main class="dashboard">

<div class="stats" id="stats"></div>

<div class="charts">
  <div class="chart-card">
    <h2>按天用量（Claude Code vs Codex）</h2>
    <div class="chart-wrap"><canvas id="chartByDate" role="img" aria-label="Claude Code 与 Codex 按天 Token 用量折线图"></canvas></div>
  </div>
  <div class="chart-card">
    <h2>按 AI 拆输入/输出</h2>
    <div class="chart-wrap"><canvas id="chartByAI" role="img" aria-label="按 AI 拆分输入和输出 Token 横向柱状图"></canvas></div>
  </div>
</div>

<div class="bottom">
  <div class="chart-card">
    <h2>按天拆输入/输出</h2>
    <div class="chart-wrap"><canvas id="chartByDateIO" role="img" aria-label="按天拆分输入和输出 Token 柱状图"></canvas></div>
  </div>
  <div class="chart-card">
    <h2>按设备对比</h2>
    <div class="chart-wrap"><canvas id="chartByDevice" role="img" aria-label="各设备 Token 用量对比柱状图"></canvas></div>
  </div>
</div>

<div class="bottom">
  <div class="chart-card project-card">
    <h2>项目 Top 10</h2>
    <div class="project-list" id="projectList"></div>
  </div>
</div>

<div class="footer" id="footer"></div>
</main>

<script>
// token 数字格式化:< 1w 原样;≥ 1w 显示 x.xxw;≥ 1亿 显示 x.xx亿
// 保留 2 位小数,末尾多余的 0 去掉(1.20w → 1.2w、1.00w → 1w)
// 边界处理:先按 w 四舍五入到 2 位小数,如果结果 ≥ 10000 再升级到亿单位,避免"9999.9999→10000w"这种奇怪显示
function tokenParts(n) {
  n = Number(n) || 0;
  if (n < 1e4) return { value: String(Math.round(n)), unit: '' };
  const roundedW = Math.round(n / 1e2) / 1e2;
  if (roundedW < 1e4) return { value: trimZero(roundedW.toFixed(2)), unit: 'w' };
  return { value: trimZero((n / 1e8).toFixed(2)), unit: '亿' };
}
function trimZero(s) { return s.replace(/\.?0+$/, ''); }
// 纯文本(图表 y 轴刻度、tooltip)
const fmt = n => {
  const p = tokenParts(n);
  return p.unit ? `${p.value}${p.unit}` : p.value;
};
const fmtShort = fmt;
// 带大小字的 HTML(卡片用)
// 三种形态:<1w → "9999 token";≥1w → "303.79 w token";≥1亿 → "2.15 亿 token"
// 数字用大字号,单位符号(w/亿)大字号加粗但和数字之间隔一空格,"亿"再套中文字体保证粗细一致,后跟"token"小字
const fmtRich = n => {
  const p = tokenParts(n);
  const num = escapeHtml(p.value);
  if (!p.unit) return `${num}<span class="unit"> token</span>`;
  const symbolCls = p.unit === '亿' ? 'unit-symbol unit-symbol--cn' : 'unit-symbol';
  return `${num}<span class="unit"> <span class="${symbolCls}">${escapeHtml(p.unit)}</span> token</span>`;
};
const today = () => new Date().toISOString().slice(0,10);
const thisMonthPrefix = () => new Date().toISOString().slice(0,7);
const deviceLabel = name => name === window.AI_TOKEN_LOCAL_DEVICE ? `${name}（本机）` : name;
const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
const escapeHtml = value => String(value).replace(/[&<>"']/g, char => HTML_ESCAPES[char]);
const totalTooltip = titlePrefix => ({
  callbacks: {
    title: items => items.length ? `${titlePrefix}: ${items[0].label}` : '',
    label: ctx => `${ctx.dataset.label}: ${fmt(ctx.raw || 0)}`,
    footer: items => `合计: ${fmt(items.reduce((sum, item) => sum + (item.raw || 0), 0))}`,
  },
});
const indexHover = { mode: 'index', intersect: false };

Chart.defaults.color = '#aaa99f';
Chart.defaults.borderColor = '#363630';
Chart.defaults.font.family = '"Arial Narrow", "Helvetica Neue", "PingFang SC", sans-serif';

async function loadAllDevices() {
  // data.js 已经把 window.AI_TOKEN_DATA 挂上,直接用即可
  // 用 .js 而不是 fetch JSON,是因为浏览器双击 file:// 打开 HTML 时,
  // fetch 同目录文件会被 CORS 拦掉,但 <script src> 加载是允许的
  return window.AI_TOKEN_DATA || null;
}

function mergeDevices(devices) {
  // 多设备合并:by_date / by_ai / by_project 各自相加,by_date_ai 按设备相加
  const merged = {
    grand_total: 0, session_count: 0,
    total_input: 0, total_output: 0,
    by_date: {}, by_ai: {}, by_project: {},
    by_date_ai: {},
    by_date_io: {},
    by_ai_io: {},
    by_device: {},
    devices: devices.length,
  };
  for (const d of devices) {
    merged.grand_total += d.grand_total;
    merged.total_input += d.total_input || 0;
    merged.total_output += d.total_output || 0;
    merged.session_count += d.session_count;
    merged.by_device[d.device] = d.grand_total;
    for (const [k, v] of Object.entries(d.by_date || {})) {
      merged.by_date[k] = (merged.by_date[k] || 0) + v;
    }
    for (const [k, v] of Object.entries(d.by_ai || {})) {
      merged.by_ai[k] = (merged.by_ai[k] || 0) + v;
    }
    for (const [k, v] of Object.entries(d.by_project || {})) {
      merged.by_project[k] = (merged.by_project[k] || 0) + v;
    }
    for (const [date, ais] of Object.entries(d.by_date_ai || {})) {
      if (!merged.by_date_ai[date]) merged.by_date_ai[date] = {};
      for (const [ai, v] of Object.entries(ais)) {
        merged.by_date_ai[date][ai] = (merged.by_date_ai[date][ai] || 0) + v;
      }
    }
    for (const [date, io] of Object.entries(d.by_date_io || {})) {
      if (!merged.by_date_io[date]) merged.by_date_io[date] = {};
      for (const [k, v] of Object.entries(io)) {
        merged.by_date_io[date][k] = (merged.by_date_io[date][k] || 0) + v;
      }
    }
    for (const [ai, io] of Object.entries(d.by_ai_io || {})) {
      if (!merged.by_ai_io[ai]) merged.by_ai_io[ai] = {};
      for (const [k, v] of Object.entries(io)) {
        merged.by_ai_io[ai][k] = (merged.by_ai_io[ai][k] || 0) + v;
      }
    }
  }
  return merged;
}

function renderStats(m) {
  const todayStr = today();
  const monthPrefix = thisMonthPrefix();
  const todayTokens = m.by_date[todayStr] || 0;
  const monthTokens = Object.entries(m.by_date)
    .filter(([d]) => d.startsWith(monthPrefix))
    .reduce((s, [, v]) => s + v, 0);
  const inPct = m.grand_total ? (m.total_input / m.grand_total * 100).toFixed(1) : 0;
  const outPct = m.grand_total ? (m.total_output / m.grand_total * 100).toFixed(1) : 0;
  const cards = [
    { label: '历史累计总消耗', valueHTML: fmtRich(m.grand_total), sub: `${m.session_count} 个会话` },
    { label: '输入消耗', valueHTML: fmtRich(m.total_input), sub: `占 ${inPct}% (含缓存)` },
    { label: '输出消耗', valueHTML: fmtRich(m.total_output), sub: `占 ${outPct}% (含推理)` },
    { label: '本月消耗', valueHTML: fmtRich(monthTokens), sub: monthPrefix },
    { label: '今日消耗', valueHTML: fmtRich(todayTokens), sub: todayStr },
    { label: '设备数', valueHTML: escapeHtml(String(m.devices)), sub: Object.keys(m.by_device).map(deviceLabel).join(' · ') },
  ];
  const cardMarkup = c => `
    <div class="stat-label">${escapeHtml(c.label)}</div>
    <div class="stat-value">${c.valueHTML}</div>
    <div class="stat-sub">${escapeHtml(c.sub)}</div>
  `;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card stat-card--hero">${cardMarkup(cards[0])}</div>
    <div class="metric-grid">
      ${cards.slice(1).map(c => `<div class="stat-card">${cardMarkup(c)}</div>`).join('')}
    </div>
  `;
}

// 5 个 chart 实例复用同一批 canvas,重渲前必须先销毁,否则 Chart.js 会报"Canvas is already in use"
const chartInstances = {};
function drawChart(key, canvasId, config) {
  if (chartInstances[key]) chartInstances[key].destroy();
  chartInstances[key] = new Chart(document.getElementById(canvasId), config);
}

function renderByDateChart(m) {
  const dates = Object.keys(m.by_date_ai).sort();
  const ais = ['Claude Code', 'Codex'];
  const colors = { 'Claude Code': '#f2f0e9', 'Codex': '#d8ff3e' };
  const datasets = ais.map(ai => ({
    label: ai,
    data: dates.map(d => m.by_date_ai[d]?.[ai] || 0),
    borderColor: colors[ai],
    backgroundColor: colors[ai] + '33',
    tension: 0.3,
    fill: false,
    pointRadius: 0,
    borderDash: ai === 'Codex' ? [8, 5] : [],
  }));
  drawChart('byDate', 'chartByDate', {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: indexHover,
      plugins: {
        legend: { position: 'top', align: 'end' },
        tooltip: totalTooltip('日期'),
      },
      scales: {
        y: { ticks: { callback: v => fmtShort(v) } },
        x: { ticks: { maxRotation: 0, autoSkipPadding: 20 } },
      },
    },
  });
}

function renderByAIChart(m) {
  // 按 AI 拆输入/输出的堆积柱图(横向)
  const labels = Object.keys(m.by_ai_io);
  const inputs = labels.map(k => m.by_ai_io[k]?.input || 0);
  const outputs = labels.map(k => m.by_ai_io[k]?.output || 0);
  drawChart('byAI', 'chartByAI', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '输入', data: inputs, backgroundColor: '#d8ff3e', borderRadius: 0 },
        { label: '输出', data: outputs, backgroundColor: '#f2f0e9', borderRadius: 0 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      interaction: indexHover,
      plugins: {
        legend: { position: 'top', align: 'end' },
        tooltip: totalTooltip('AI'),
      },
      scales: {
        x: { stacked: true, ticks: { callback: v => fmtShort(v) } },
        y: { stacked: true },
      },
    },
  });
}

function renderByDateIOChart(m) {
  // 按天拆输入/输出的堆积柱图
  const dates = Object.keys(m.by_date_io).sort();
  const inputs = dates.map(d => m.by_date_io[d]?.input || 0);
  const outputs = dates.map(d => m.by_date_io[d]?.output || 0);
  drawChart('byDateIO', 'chartByDateIO', {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [
        { label: '输入', data: inputs, backgroundColor: '#d8ff3e' },
        { label: '输出', data: outputs, backgroundColor: '#f2f0e9' },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: indexHover,
      plugins: {
        legend: { position: 'top', align: 'end' },
        tooltip: totalTooltip('日期'),
      },
      scales: {
        x: { stacked: true, ticks: { maxRotation: 0, autoSkipPadding: 20 } },
        y: { stacked: true, ticks: { callback: v => fmtShort(v) } },
      },
    },
  });
}

function renderByDeviceChart(m) {
  const labels = Object.keys(m.by_device);
  const data = labels.map(k => m.by_device[k]);
  drawChart('byDevice', 'chartByDevice', {
    type: 'bar',
    data: {
      labels: labels.map(deviceLabel),
      datasets: [{ data, backgroundColor: '#d8ff3e', borderRadius: 0 }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      interaction: indexHover,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: () => '设备对比',
            label: () => labels.map((label, index) => `${label}: ${fmt(data[index] || 0)}`),
            footer: () => `合计: ${fmt(data.reduce((sum, value) => sum + value, 0))}`,
          },
        },
      },
      scales: { x: { ticks: { callback: v => fmtShort(v) } } },
    },
  });
}

function renderProjectList(m) {
  const entries = Object.entries(m.by_project).sort((a,b) => b[1]-a[1]).slice(0, 10);
  const max = entries[0]?.[1] || 1;
  document.getElementById('projectList').innerHTML = entries.map(([name, tokens]) => `
    <div class="project-row">
      <span class="project-name">${escapeHtml(name)}</span>
      <span class="project-bar"><span class="project-bar-fill" style="width:${(tokens/max*100).toFixed(1)}%"></span></span>
      <span class="project-tokens">${fmt(tokens)}</span>
    </div>
  `).join('');
}

function renderAll(devices) {
  const m = mergeDevices(devices);
  const lastScan = devices.map(d => d.scanned_at).sort().pop();
  const sourceLabel = window.AI_TOKEN_DATA_IS_EXAMPLE ? '虚构示例数据 · ' : '';
  document.getElementById('subtitle').textContent =
    `${sourceLabel}最后更新: ${new Date(lastScan).toLocaleString('zh-CN')} · ${devices.length} 台设备 · ${m.session_count} 个会话`;

  renderStats(m);
  renderByDateChart(m);
  renderByAIChart(m);
  renderByDateIOChart(m);
  renderByDeviceChart(m);
  renderProjectList(m);
  document.getElementById('footer').textContent =
    '只保存并同步 Token 用量，不保存或上传对话正文 · 项目名已生成伪匿名代号';
}

// 计算所有设备 scanned_at 的指纹,用来判断数据有没有变(有一台变了就整体重渲)
function scanFingerprint(devices) {
  return (devices || []).map(d => `${d.device}|${d.scanned_at}`).sort().join('||');
}

// 静默轮询:.app 后台跑 refresh-data.sh 时,页面每 2 秒重载一次 data.js
// 检测到 scanned_at 变了就重渲,无任何可见提示;总共最多 30 次(60 秒),避免 scan 卡死时无限轮询
function pollForUpdates(initialFingerprint) {
  const MAX_ATTEMPTS = 30;
  const INTERVAL_MS = 2000;
  let attempts = 0;
  let currentFingerprint = initialFingerprint;
  const timer = setInterval(() => {
    attempts += 1;
    if (attempts > MAX_ATTEMPTS) { clearInterval(timer); return; }
    // 用带时间戳的 <script> 标签重载 data.js,绕过浏览器缓存
    const script = document.createElement('script');
    script.src = `data.js?t=${Date.now()}`;
    script.onload = () => {
      script.remove();
      const devices = window.AI_TOKEN_DATA;
      if (!devices || devices.length === 0) return;
      const fingerprint = scanFingerprint(devices);
      if (fingerprint !== currentFingerprint) {
        currentFingerprint = fingerprint;
        renderAll(devices);
        clearInterval(timer);
      }
    };
    script.onerror = () => script.remove();
    document.head.appendChild(script);
  }, INTERVAL_MS);
}

(async () => {
  const devices = await loadAllDevices();

    return;
  }
  renderAll(devices);
  pollForUpdates(scanFingerprint(devices));
})();
</script>
